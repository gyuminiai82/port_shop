version: '3.8'

services:
  port_shop_app:
    container_name: port_shop_app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      # 상품 업로드 이미지 유지를 위한 볼륨 설정
      - port_shop_uploads:/app/public/uploads
    restart: unless-stopped
    networks:
      - proxy-network

volumes:
  port_shop_uploads:

networks:
  proxy-network:
    external: true

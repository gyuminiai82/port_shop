version: '3.8'

services:
  port_shop_app:
    container_name: port_shop_app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      # Uncomment and replace with your actual DB URL when deploying
      # - DATABASE_URL=mysql://user:password@host:3306/dbname
      # - REDIS_URL=redis://localhost:6379
    volumes:
      # 상품 업로드 이미지 유지를 위한 볼륨 설정
      - port_shop_uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  port_shop_uploads:

name: Deploy to Production

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: gyumini.iptime.org
          username: gyumin
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            if [ ! -d "/home/gyumin/port_shop" ]; then
              echo "프로젝트 폴더가 없습니다. 최초 1회 git clone을 진행합니다."
              cd /home/gyumin
              git clone https://github.com/gyuminiai82/port_shop.git
              cd port_shop
            else
              echo "프로젝트 폴더가 존재합니다. 최신 코드를 당겨옵니다."
              cd /home/gyumin/port_shop
              git pull origin main
            fi
            
            # 도커 이미지를 새로 빌드하고 재시작합니다.
            docker-compose up -d --build
